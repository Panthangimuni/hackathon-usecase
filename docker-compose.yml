version: '3.8'

services:

  patient-service:
    build: ./patient-service
    container_name: patient-service
    ports:
      - "3000:3000"

  appointment-service:
    build: ./application-service
    container_name: appointment-service
    ports:
      - "3001:3001"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8080:8080"
